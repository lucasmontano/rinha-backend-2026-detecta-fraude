services:
  api1:
    logging:
      driver: "json-file"
    environment:
      RINHA_EXACT_KNN: "1"
      RINHA_INDEX_PATH: "/data/references.kdx"
    volumes:
      - "${RINHA_DATA_DIR:-/private/tmp/rinha-bench}:/data:ro"

  api2:
    logging:
      driver: "json-file"
    environment:
      RINHA_EXACT_KNN: "1"
      RINHA_INDEX_PATH: "/data/references.kdx"
    volumes:
      - "${RINHA_DATA_DIR:-/private/tmp/rinha-bench}:/data:ro"
